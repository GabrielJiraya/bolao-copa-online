<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bolao da Copa</title>
  <style>
    :root {
      --bg: #f4f6f1;
      --paper: #ffffff;
      --ink: #18211b;
      --muted: #66736b;
      --line: #dce5dc;
      --green: #0f7a45;
      --green-dark: #075c35;
      --yellow: #f2c230;
      --red: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff;
      padding: 24px 16px 18px;
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 30px;
      line-height: 1.05;
    }

    h2 { margin: 0 0 14px; font-size: 20px; }
    h3 { margin: 18px 0 10px; font-size: 15px; }
    p { line-height: 1.45; }

    .sub {
      margin: 0;
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      padding: 12px;
    }

    .stat span { display: block; color: rgba(255,255,255,.78); font-size: 13px; }
    .stat b { display: block; margin-top: 4px; font-size: 23px; }

    main { padding: 16px 0 40px; }

    .topbar {
      display: flex;
      align-items: end;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .topbar > div { min-width: 180px; flex: 1; }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      padding: 11px 10px;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      padding: 11px 14px;
      cursor: pointer;
    }

    button.secondary {
      background: #edf3ec;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.danger {
      background: #fff1ef;
      color: var(--red);
      border: 1px solid #ffd4cf;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tab {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .tab.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .panel {
      display: none;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .panel.active { display: block; }

    .game {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .game-title {
      font-weight: 900;
      font-size: 16px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .score {
      display: flex;
      gap: 7px;
      align-items: center;
      width: 156px;
    }

    .score input {
      text-align: center;
      padding: 9px 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f8faf6;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .pill {
      display: inline-block;
      background: #edf7f1;
      color: var(--green);
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 900;
      font-size: 12px;
    }

    .pos {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #eef3eb;
      font-weight: 900;
    }

    .first { background: var(--yellow); color: #392900; }

    .empty, .notice {
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 16px;
      text-align: center;
    }

    .notice {
      background: #f9fbf7;
      border-style: solid;
      text-align: left;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }

    .message {
      min-height: 22px;
      color: var(--green);
      font-weight: 800;
      margin-top: 10px;
    }

    @media (max-width: 760px) {
      .stats, .admin-grid { grid-template-columns: 1fr; }
      .game { grid-template-columns: 1fr; }
      .score { width: 100%; }
      th, td { padding: 8px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Bolao da Copa</h1>
      <p class="sub">Palpite por dia, ranking liberado pelo admin.</p>
      <div class="stats">
        <div class="stat"><span>Jogos no dia</span><b id="statGames">0</b></div>
        <div class="stat"><span>Palpites enviados</span><b id="statGuesses">0</b></div>
        <div class="stat"><span>Ranking</span><b id="statRanking">Off</b></div>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="topbar">
        <div>
          <label>Dia dos jogos</label>
          <input id="date" type="date" />
        </div>
        <button class="secondary" id="todayBtn">Hoje</button>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="palpite">Palpite</button>
        <button class="tab" data-tab="ranking">Ranking</button>
        <button class="tab" data-tab="admin">Admin</button>
      </nav>

      <section class="panel active" id="palpite">
        <h2>Enviar palpite</h2>
        <div class="topbar">
          <div>
            <label>Seu nome</label>
            <input id="name" placeholder="Ex: Terra" autocomplete="name" />
          </div>
          <button id="submitGuess">Enviar palpites</button>
        </div>
        <div id="gamesForGuess"></div>
        <div class="message" id="guessMessage"></div>
      </section>

      <section class="panel" id="ranking">
        <h2>Ranking do dia</h2>
        <div id="rankingBox"></div>
      </section>

      <section class="panel" id="admin">
        <h2>Admin</h2>
        <div class="topbar">
          <div>
            <label>PIN do admin</label>
            <input id="pin" type="password" placeholder="PIN" />
          </div>
          <button id="loadAdmin">Entrar</button>
        </div>

        <div id="adminArea" style="display:none">
          <div class="admin-grid">
            <div>
              <h3>Cadastrar jogo</h3>
              <div class="topbar">
                <div><label>Time A</label><input id="home" placeholder="Brasil" /></div>
                <div><label>Time B</label><input id="away" placeholder="Argentina" /></div>
                <button id="addGame">Adicionar</button>
              </div>

              <h3>Controle</h3>
              <div class="actions">
                <button id="toggleRanking">Liberar ranking</button>
                <button class="secondary" id="refreshAdmin">Atualizar</button>
              </div>
            </div>

            <div>
              <h3>Resultados oficiais</h3>
              <div id="adminGames"></div>
            </div>
          </div>
        </div>

        <div class="message" id="adminMessage"></div>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const today = new Date().toISOString().slice(0, 10);
    $("date").value = today;
    let state = { settings: { showRanking: false }, games: [], ranking: null };

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    async function request(path, options = {}) {
      const headers = { "content-type": "application/json", ...(options.headers || {}) };
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Erro");
      return data;
    }

    async function loadState() {
      const date = $("date").value;
      state = await request(`/api/state?date=${encodeURIComponent(date)}`);
      render();
    }

    function renderStats() {
      $("statGames").textContent = state.games.length;
      $("statGuesses").textContent = state.ranking ? state.ranking.reduce((max, row) => Math.max(max, row.guesses), 0) : "-";
      $("statRanking").textContent = state.settings.showRanking ? "On" : "Off";
    }

    function renderGuessGames() {
      if (!state.games.length) {
        $("gamesForGuess").innerHTML = '<div class="empty">Ainda nao tem jogo cadastrado para esse dia.</div>';
        return;
      }

      $("gamesForGuess").innerHTML = state.games.map((game) => `
        <div class="game">
          <div>
            <div class="game-title">${escapeHtml(game.home)} x ${escapeHtml(game.away)}</div>
            <div class="small">Coloque o placar desse jogo</div>
          </div>
          <div class="score">
            <input data-game="${game.id}" data-side="homeScore" type="number" min="0" placeholder="0" />
            <span>x</span>
            <input data-game="${game.id}" data-side="awayScore" type="number" min="0" placeholder="0" />
          </div>
        </div>
      `).join("");
    }

    function renderRanking() {
      if (!state.settings.showRanking) {
        $("rankingBox").innerHTML = '<div class="notice"><b>Ranking fechado.</b><br>O admin ainda nao liberou a visualizacao. Assim ninguem ve a jogada dos outros antes da hora.</div>';
        return;
      }

      if (!state.ranking || !state.ranking.length) {
        $("rankingBox").innerHTML = '<div class="empty">Ainda nao tem palpite pontuado.</div>';
        return;
      }

      $("rankingBox").innerHTML = `
        <table>
          <thead><tr><th>Pos.</th><th>Nome</th><th>Pontos</th><th>Cravadas</th></tr></thead>
          <tbody>
            ${state.ranking.map((row, index) => `
              <tr>
                <td><span class="pos ${index === 0 ? "first" : ""}">${index + 1}</span></td>
                <td><b>${escapeHtml(row.name)}</b></td>
                <td><span class="pill">${row.points} pts</span></td>
                <td>${row.exact}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderAdminGames() {
      if (!$("adminArea").style.display || $("adminArea").style.display === "none") return;

      if (!state.games.length) {
        $("adminGames").innerHTML = '<div class="empty">Nenhum jogo nesse dia.</div>';
        return;
      }

      $("adminGames").innerHTML = state.games.map((game) => `
        <div class="game">
          <div>
            <div class="game-title">${escapeHtml(game.home)} x ${escapeHtml(game.away)}</div>
            <div class="small">Resultado oficial</div>
          </div>
          <div>
            <div class="score">
              <input id="rh-${game.id}" type="number" min="0" value="${game.homeScore ?? ""}" />
              <span>x</span>
              <input id="ra-${game.id}" type="number" min="0" value="${game.awayScore ?? ""}" />
            </div>
            <div class="actions">
              <button onclick="saveResult('${game.id}')">Salvar</button>
              <button class="danger" onclick="deleteGame('${game.id}')">Remover</button>
            </div>
          </div>
        </div>
      `).join("");

      $("toggleRanking").textContent = state.settings.showRanking ? "Fechar ranking" : "Liberar ranking";
    }

    function render() {
      renderStats();
      renderGuessGames();
      renderRanking();
      renderAdminGames();
    }

    async function submitGuess() {
      const name = $("name").value.trim().replace(/\s+/g, " ");
      const date = $("date").value;
      if (!name) {
        $("guessMessage").textContent = "Coloca seu nome primeiro.";
        return;
      }

      const guesses = state.games.map((game) => {
        const home = document.querySelector(`[data-game="${game.id}"][data-side="homeScore"]`).value;
        const away = document.querySelector(`[data-game="${game.id}"][data-side="awayScore"]`).value;
        return { gameId: game.id, homeScore: home, awayScore: away };
      });

      await request("/api/guess", {
        method: "POST",
        body: JSON.stringify({ date, name, guesses })
      });

      $("guessMessage").textContent = "Palpite enviado. Ta na base.";
      await loadState();
    }

    async function enterAdmin() {
      try {
        await request(`/api/admin/state?date=${encodeURIComponent($("date").value)}`, {
          headers: { "x-admin-pin": $("pin").value }
        });
        $("adminArea").style.display = "block";
        $("adminMessage").textContent = "Admin liberado.";
        await loadState();
      } catch (err) {
        $("adminMessage").textContent = err.message;
      }
    }

    async function addGame() {
      await request("/api/admin/game", {
        method: "POST",
        headers: { "x-admin-pin": $("pin").value },
        body: JSON.stringify({
          date: $("date").value,
          home: $("home").value,
          away: $("away").value
        })
      });
      $("home").value = "";
      $("away").value = "";
      $("adminMessage").textContent = "Jogo adicionado.";
      await loadState();
    }

    async function saveResult(gameId) {
      await request("/api/admin/result", {
        method: "PATCH",
        headers: { "x-admin-pin": $("pin").value },
        body: JSON.stringify({
          gameId,
          homeScore: $(`rh-${gameId}`).value,
          awayScore: $(`ra-${gameId}`).value
        })
      });
      $("adminMessage").textContent = "Resultado salvo.";
      await loadState();
    }

    async function deleteGame(gameId) {
      await request(`/api/admin/game?id=${encodeURIComponent(gameId)}`, {
        method: "DELETE",
        headers: { "x-admin-pin": $("pin").value }
      });
      $("adminMessage").textContent = "Jogo removido.";
      await loadState();
    }

    async function toggleRanking() {
      await request("/api/admin/settings", {
        method: "PATCH",
        headers: { "x-admin-pin": $("pin").value },
        body: JSON.stringify({ showRanking: !state.settings.showRanking })
      });
      $("adminMessage").textContent = "Controle de ranking atualizado.";
      await loadState();
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        $(button.dataset.tab).classList.add("active");
      });
    });

    $("todayBtn").addEventListener("click", () => {
      $("date").value = today;
      loadState();
    });
    $("date").addEventListener("change", loadState);
    $("submitGuess").addEventListener("click", submitGuess);
    $("loadAdmin").addEventListener("click", enterAdmin);
    $("addGame").addEventListener("click", addGame);
    $("refreshAdmin").addEventListener("click", loadState);
    $("toggleRanking").addEventListener("click", toggleRanking);

    loadState();
  </script>
</body>
</html>
